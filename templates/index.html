<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT 设备监控大屏</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .header {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header h1 {
            color: #4fc3f7;
            font-size: 28px;
            font-weight: 600;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .nav-tabs {
            display: flex;
            gap: 10px;
        }
        
        .nav-tab {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #90a4ae;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .nav-tab:hover {
            background: rgba(79, 195, 247, 0.1);
            border-color: rgba(79, 195, 247, 0.3);
        }
        
        .nav-tab.active {
            background: rgba(79, 195, 247, 0.2);
            border-color: rgba(79, 195, 247, 0.5);
            color: #4fc3f7;
        }
        
        .user-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-info {
            font-size: 14px;
            color: #90a4ae;
        }
        
        .user-info .username {
            color: #4fc3f7;
            font-weight: 600;
        }
        
        .user-info .role {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 8px;
        }
        
        .btn {
            background: linear-gradient(135deg, #4fc3f7, #29b6f6);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 195, 247, 0.4);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #90a4ae;
        }
        
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.5);
            transform: none;
            box-shadow: none;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
        }
        
        .btn-danger:hover {
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #4caf50, #45a049);
        }
        
        .btn-success:hover {
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.4);
        }
        
        .status-bar {
            display: flex;
            gap: 30px;
            align-items: center;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-dot.online {
            background: #4caf50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }
        
        .status-dot.offline {
            background: #f44336;
            box-shadow: 0 0 10px rgba(244, 67, 54, 0.3);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .last-update {
            color: #90a4ae;
            font-size: 12px;
        }
        
        .main-content {
            padding: 40px;
        }
        
        .devices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        
        .device-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .device-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
        }
        
        .device-card.online::before {
            background: linear-gradient(90deg, #4caf50, #8bc34a);
        }
        
        .device-card.offline::before {
            background: linear-gradient(90deg, #f44336, #ff5722);
        }
        
        .device-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(79, 195, 247, 0.3);
        }
        
        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
        }
        
        .device-info h3 {
            font-size: 18px;
            color: #fff;
            margin-bottom: 5px;
        }
        
        .device-info .device-id {
            font-size: 12px;
            color: #78909c;
            font-family: monospace;
        }
        
        .device-status {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .device-status.online {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }
        
        .device-status.offline {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }
        
        .sensor-data {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .sensor-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        
        .sensor-label {
            font-size: 12px;
            color: #90a4ae;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .sensor-value {
            font-size: 28px;
            font-weight: 700;
            color: #4fc3f7;
        }
        
        .sensor-value .unit {
            font-size: 14px;
            color: #78909c;
            margin-left: 4px;
        }
        
        .device-footer {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #546e7a;
        }
        
        .model-badge {
            background: rgba(79, 195, 247, 0.15);
            color: #4fc3f7;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 500;
        }
        
        .no-data {
            text-align: center;
            color: #546e7a;
            font-size: 14px;
            padding: 20px;
        }
        
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            color: #90a4ae;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(79, 195, 247, 0.1);
            border-top-color: #4fc3f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-message {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #f44336;
            padding: 15px 25px;
            border-radius: 8px;
            margin: 20px 40px;
            display: none;
        }
        
        .error-message.visible {
            display: block;
        }
        
        .control-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
        }
        
        .control-btn:disabled {
            background: #546e7a;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .control-btn:disabled:hover {
            transform: none;
            box-shadow: none;
        }
        
        .control-btn.success {
            background: linear-gradient(135deg, #4caf50, #45a049);
        }
        
        .control-btn.loading {
            background: linear-gradient(135deg, #78909c, #546e7a);
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            transition: transform 0.3s ease;
            max-width: 400px;
            text-align: center;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .toast.success {
            border-left: 4px solid #4caf50;
        }
        
        .toast.error {
            border-left: 4px solid #f44336;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: #1a1a2e;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h3 {
            color: #4fc3f7;
            font-size: 18px;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: #90a4ae;
            font-size: 24px;
            cursor: pointer;
            line-height: 1;
        }
        
        .modal-close:hover {
            color: #fff;
        }
        
        .modal-body {
            padding: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: #90a4ae;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4fc3f7;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .form-group select {
            cursor: pointer;
        }
        
        .form-group select option {
            background: #1a1a2e;
            color: #fff;
        }
        
        .modal-footer {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        
        .complaints-section {
            display: none;
        }
        
        .complaints-section.active {
            display: block;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .section-header h2 {
            color: #4fc3f7;
            font-size: 24px;
        }
        
        .complaints-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .complaints-table th,
        .complaints-table td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .complaints-table th {
            background: rgba(0, 0, 0, 0.3);
            color: #90a4ae;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .complaints-table td {
            color: #e0e0e0;
            font-size: 14px;
        }
        
        .complaints-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        
        .complaints-table .title-cell {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .complaints-table .content-cell {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-badge.pending {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }
        
        .status-badge.in_progress {
            background: rgba(33, 150, 243, 0.2);
            color: #2196f3;
        }
        
        .status-badge.resolved {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }
        
        .action-btn {
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .action-btn.primary {
            background: rgba(79, 195, 247, 0.2);
            color: #4fc3f7;
        }
        
        .action-btn.primary:hover {
            background: rgba(79, 195, 247, 0.3);
        }
        
        .tab-container {
            display: flex;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }
        
        .tab-item {
            padding: 12px 24px;
            color: #90a4ae;
            cursor: pointer;
            font-size: 14px;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }
        
        .tab-item:hover {
            color: #4fc3f7;
        }
        
        .tab-item.active {
            color: #4fc3f7;
            border-bottom-color: #4fc3f7;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .reply-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }
        
        .reply-item.admin {
            border-left: 3px solid #4fc3f7;
            background: rgba(79, 195, 247, 0.05);
        }
        
        .reply-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .reply-author {
            color: #4fc3f7;
            font-weight: 600;
            font-size: 14px;
        }
        
        .reply-author .role-badge {
            background: rgba(79, 195, 247, 0.2);
            color: #4fc3f7;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 8px;
        }
        
        .reply-time {
            color: #546e7a;
            font-size: 12px;
        }
        
        .reply-content {
            color: #e0e0e0;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .complaint-detail {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .complaint-detail .complaint-title {
            color: #fff;
            font-size: 16px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        
        .complaint-detail .complaint-content {
            color: #b0b0b0;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .complaint-detail .complaint-meta {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            font-size: 12px;
            color: #546e7a;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #546e7a;
        }
        
        .empty-state .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .empty-state .empty-text {
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .empty-state .empty-hint {
            font-size: 14px;
            color: #78909c;
        }
        
        .processing-modal .modal {
            max-width: 600px;
        }
        
        .processing-modal .complaint-info {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .processing-modal .complaint-info-title {
            color: #4fc3f7;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .processing-modal .complaint-info-content {
            color: #b0b0b0;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .history-modal .modal {
            max-width: 900px;
            width: 95%;
        }
        
        .history-toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .history-toolbar label {
            color: #90a4ae;
            font-size: 14px;
            margin-right: 8px;
        }
        
        .time-range-select {
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            font-size: 14px;
            cursor: pointer;
        }
        
        .time-range-select:hover {
            border-color: rgba(79, 195, 247, 0.5);
        }
        
        .time-range-select:focus {
            outline: none;
            border-color: #4fc3f7;
        }
        
        .refresh-btn {
            padding: 8px 20px;
            background: linear-gradient(135deg, #4fc3f7 0%, #29b6f6 100%);
            border: none;
            border-radius: 6px;
            color: #1a1a2e;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(79, 195, 247, 0.4);
        }
        
        .refresh-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .history-chart-container {
            width: 100%;
            height: 400px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .history-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        
        .stat-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #4fc3f7;
        }
        
        .stat-label {
            font-size: 12px;
            color: #78909c;
            margin-top: 4px;
        }
        
        .stat-card.alert .stat-value {
            color: #ff5252;
        }
        
        .chart-loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #78909c;
        }
        
        .chart-loading .loading-spinner {
            margin-right: 12px;
        }
        
        .realtime-chart-container {
            width: 100%;
            height: 150px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-top: 16px;
            position: relative;
        }
        
        .realtime-chart-title {
            position: absolute;
            top: 8px;
            left: 12px;
            font-size: 11px;
            color: #78909c;
            z-index: 10;
            background: rgba(26, 26, 46, 0.8);
            padding: 2px 8px;
            border-radius: 4px;
        }
        
        .realtime-chart-status {
            position: absolute;
            top: 8px;
            right: 12px;
            font-size: 10px;
            color: #4caf50;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .realtime-chart-status .status-dot {
            width: 6px;
            height: 6px;
            background: #4caf50;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        
        .control-panel {
            margin-top: 16px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .control-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .control-panel-title {
            font-size: 14px;
            font-weight: 600;
            color: #4fc3f7;
        }
        
        .control-panel-status {
            font-size: 11px;
            color: #78909c;
        }
        
        .switch-controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .switch-control {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }
        
        .switch-label {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .switch-label-main {
            font-size: 13px;
            color: #e0e0e0;
            font-weight: 500;
        }
        
        .switch-label-sub {
            font-size: 10px;
            color: #78909c;
        }
        
        .switch {
            position: relative;
            width: 48px;
            height: 26px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #546e7a;
            transition: 0.3s;
            border-radius: 26px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background: linear-gradient(135deg, #4fc3f7, #29b6f6);
        }
        
        input:checked + .slider:before {
            transform: translateX(22px);
        }
        
        .slider:hover {
            background-color: #607d8b;
        }
        
        input:checked + .slider:hover {
            background: linear-gradient(135deg, #4fc3f7, #29b6f6);
        }
        
        .command-section {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 16px;
        }
        
        .command-label {
            font-size: 12px;
            color: #90a4ae;
            margin-bottom: 8px;
            display: block;
        }
        
        .command-input-row {
            display: flex;
            gap: 10px;
        }
        
        .command-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 14px;
            color: #fff;
            font-size: 13px;
            font-family: 'Consolas', 'Monaco', monospace;
        }
        
        .command-input:focus {
            outline: none;
            border-color: #4fc3f7;
        }
        
        .command-input::placeholder {
            color: #546e7a;
        }
        
        .send-command-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #4fc3f7, #29b6f6);
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        
        .send-command-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79, 195, 247, 0.4);
        }
        
        .send-command-btn:disabled {
            background: #546e7a;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .command-history {
            margin-top: 12px;
            max-height: 80px;
            overflow-y: auto;
        }
        
        .command-history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            margin-bottom: 4px;
            font-size: 11px;
        }
        
        .command-history-item .cmd-text {
            color: #4fc3f7;
            font-family: 'Consolas', 'Monaco', monospace;
        }
        
        .command-history-item .cmd-status {
            color: #78909c;
        }
        
        .command-history-item .cmd-status.success {
            color: #4caf50;
        }
        
        .command-history-item .cmd-status.error {
            color: #f44336;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>📡 IoT 设备监控大屏</h1>
        <div class="header-right">
            <div class="nav-tabs">
                <div class="nav-tab active" data-tab="devices">设备监控</div>

                <div id="feedback-new-tab" class="tab-content active">

    <div id="processing-modal" class="modal-overlay processing-modal">
        <div class="modal">
            <div class="modal-header">
                <h3>处理投诉</h3>
                <button class="modal-close" onclick="closeModal('processing-modal')">&times;</button>

                    <div class="complaint-info-content" id="processing-complaint-content"></div>

    <div id="history-modal" class="modal-overlay history-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="history-modal-title">设备历史数据</h3>
                <button class="modal-close" onclick="closeModal('history-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="history-toolbar">
                    <label>时间范围:</label>
                    <select id="time-range-select" class="time-range-select" onchange="onTimeRangeChange()">
                        <option value="1">最近 1 小时</option>
                        <option value="6">最近 6 小时</option>
                        <option value="12">最近 12 小时</option>
                        <option value="24">最近 24 小时</option>
                        <option value="168">最近 7 天</option>
                    </select>
                    <label>聚合间隔:</label>
                    <select id="interval-select" class="time-range-select">
                        <option value="60">1 分钟</option>
                        <option value="300" selected>5 分钟</option>
                        <option value="600">10 分钟</option>
                        <option value="1800">30 分钟</option>
                        <option value="3600">1 小时</option>
                    </select>
                    <button id="refresh-history-btn" class="refresh-btn" onclick="refreshHistoryData()">
                        刷新数据
                    </button>
                </div>
                <div id="history-chart" class="history-chart-container">
                    <div class="chart-loading">
                        <div class="loading-spinner"></div>
                        <span>暂无数据</span>
                    </div>
                </div>
                <div class="history-stats">
                    <div class="stat-card">
                        <div class="stat-value" id="stat-total-points">0</div>
                        <div class="stat-label">数据点数量</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-avg-temp">-</div>
                        <div class="stat-label">平均温度 (°C)</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-max-temp">-</div>
                        <div class="stat-label">最高温度 (°C)</div>
                    </div>
                    <div class="stat-card alert" id="stat-alert-card" style="display: none;">
                        <div class="stat-value" id="stat-alert-count">0</div>
                        <div class="stat-label">告警聚合点</div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal('history-modal')">关闭</button>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = '/devices';
        const REFRESH_INTERVAL = 5000;
        
        let onlineCount = 0;
        let offlineCount = 0;
        let currentUser = null;
        let currentProcessingComplaintId = null;
        
        function formatDateTime(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }
        
        function formatSensorLabel(key) {
            const labels = {
                'temperature': '温度',
                'humidity': '湿度',
                'pressure': '气压',
                'battery': '电量',
                'signal': '信号',
                'light': '光照',
                'co2': 'CO2',
                'pm25': 'PM2.5',
                'voltage': '电压',
                'current': '电流'
            };
            return labels[key.toLowerCase()] || key;
        }
        
        function formatSensorValue(key, value) {
            const units = {
                'temperature': '°C',
                'humidity': '%',
                'pressure': 'hPa',
                'battery': '%',
                'signal': '%',
                'light': 'lux',
                'co2': 'ppm',
                'pm25': 'μg/m³',
                'voltage': 'V',
                'current': 'A'
            };
            
            let displayValue = value;
            if (typeof value === 'number') {
                displayValue = value.toFixed(1);
            }
            
            const unit = units[key.toLowerCase()] || '';
            return `<span>${displayValue}</span><span class="unit">${unit}</span>`;
        }
        
        function createDeviceCard(device) {
            const isOnline = device.status === 'online';
            onlineCount += isOnline ? 1 : 0;
            offlineCount += isOnline ? 0 : 1;
            
            const statusClass = isOnline ? 'online' : 'offline';
            const statusText = isOnline ? '在线' : '离线';
            const btnDisabled = isOnline ? '' : 'disabled';
            const controlDisabled = isOnline ? '' : 'disabled';
            
            let sensorHtml = '';
            if (device.latest_payload && Object.keys(device.latest_payload).length > 0) {
                const sensors = Object.entries(device.latest_payload);
                sensorHtml = '<div class="sensor-data">';
                
                sensors.forEach(([key, value]) => {
                    sensorHtml += `
                        <div class="sensor-item">
                            <div class="sensor-label">${formatSensorLabel(key)}</div>
                            <div class="sensor-value">${formatSensorValue(key, value)}</div>
                        </div>
                    `;
                });
                
                sensorHtml += '</div>';
            } else {
                sensorHtml = '<div class="no-data">暂无传感器数据</div>';
            }
            
            const chartId = `realtime-chart-${device.device_id.replace(/-/g, '')}`;
            const lightSwitchId = `switch-light-${device.device_id.replace(/-/g, '')}`;
            const fanSwitchId = `switch-fan-${device.device_id.replace(/-/g, '')}`;
            const commandInputId = `command-input-${device.device_id.replace(/-/g, '')}`;
            const commandHistoryId = `command-history-${device.device_id.replace(/-/g, '')}`;
            
            return `
                <div class="device-card ${statusClass}" data-device-id="${device.device_id}">
                    <div class="device-header">
                        <div class="device-info">
                            <h3>设备 ${device.device_id.substring(0, 8)}</h3>
                            <div class="device-id">ID: ${device.device_id}</div>
                        </div>
                        <div class="device-status ${statusClass}">
                            <span class="status-dot ${statusClass}"></span>
                            ${statusText}
                        </div>
                    </div>
                    
                    ${sensorHtml}
                    
                    <div class="realtime-chart-container" id="${chartId}" data-device-id="${device.device_id}">
                        <div class="realtime-chart-title">📈 实时温度曲线 (最近 50 点)</div>
                        <div class="realtime-chart-status" style="${isOnline ? '' : 'display: none;'}">
                            <span class="status-dot"></span>
                            <span>实时更新中</span>
                        </div>
                        <div class="chart-loading" style="display: flex;">
                            <span>等待数据...</span>
                        </div>
                    </div>
                    
                    <div class="control-panel" id="control-panel-${device.device_id.replace(/-/g, '')}">
                        <div class="control-panel-header">
                            <span class="control-panel-title">🎛️ 远程控制</span>
                            <span class="control-panel-status">${isOnline ? '设备在线，可控制' : '设备离线，控制不可用'}</span>
                        </div>
                        
                        <div class="switch-controls">
                            <div class="switch-control">
                                <div class="switch-label">
                                    <span class="switch-label-main">💡 灯光</span>
                                    <span class="switch-label-sub">light_switch</span>
                                </div>
                                <label class="switch">
                                    <input type="checkbox" id="${lightSwitchId}" 
                                           data-device-id="${device.device_id}" 
                                           data-command="light_switch"
                                           onchange="handleSwitchChange(this)"
                                           ${controlDisabled}>
                                    <span class="slider"></span>
                                </label>
                            </div>
                            
                            <div class="switch-control">
                                <div class="switch-label">
                                    <span class="switch-label-main">🌀 风扇</span>
                                    <span class="switch-label-sub">fan_switch</span>
                                </div>
                                <label class="switch">
                                    <input type="checkbox" id="${fanSwitchId}" 
                                           data-device-id="${device.device_id}" 
                                           data-command="fan_switch"
                                           onchange="handleSwitchChange(this)"
                                           ${controlDisabled}>
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                        
                        <div class="command-section">
                            <label class="command-label">📝 自定义指令</label>
                            <div class="command-input-row">
                                <input type="text" class="command-input" id="${commandInputId}" 
                                       placeholder="例如: set_mode=auto, brightness=80"
                                       data-device-id="${device.device_id}"
                                       ${controlDisabled}>
                                <button class="send-command-btn" 
                                        onclick="sendCustomCommand('${device.device_id}')"
                                        ${controlDisabled}>
                                    发送
                                </button>
                            </div>
                            <div class="command-history" id="${commandHistoryId}">
                            </div>
                        </div>
                    </div>
                    
                    <div class="device-footer">
                        <span class="model-badge">${device.model}</span>
                        <button class="control-btn" data-device-id="${device.device_id}" onclick="showDeviceHistory('${device.device_id}', '${device.model}')">
                            查看历史
                        </button>
                        <button class="control-btn" data-device-id="${device.device_id}" ${btnDisabled}>
                            远程关机
                        </button>
                    </div>
                </div>
            `;
        }
        
        function updateDashboard(devices) {
            const loadingElement = document.getElementById('loading');
            const container = document.getElementById('devices-container');
            const errorElement = document.getElementById('error-message');
            
            onlineCount = 0;
            offlineCount = 0;
            
            if (devices.length === 0) {
                loadingElement.style.display = 'flex';
                loadingElement.innerHTML = `
                    <div class="loading-spinner" style="animation: none;"></div>
                    <p>暂无设备数据，请先注册设备</p>
                `;
                container.style.display = 'none';
                return;
            }
            
            loadingElement.style.display = 'none';
            container.style.display = 'grid';
            errorElement.classList.remove('visible');
            
            container.innerHTML = devices.map(device => createDeviceCard(device)).join('');
        }
        
        function showError(message) {
            const errorElement = document.getElementById('error-message');
            errorElement.textContent = message;
            errorElement.classList.add('visible');
        }
        
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        async function controlDevice(deviceId, command, value) {
            try {
                const response = await fetch(`/devices/control/${deviceId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        command: command,
                        value: value
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || `HTTP 错误: ${response.status}`);
                }
                
                const result = await response.json();
                return { success: true, data: result };
            } catch (error) {
                return { success: false, error: error.message };
            }
        }
        
        async function handleShutdownClick(event) {
            const button = event.target.closest('.control-btn');
            if (!button || button.disabled) return;
            
            const deviceId = button.dataset.deviceId;
            
            const originalText = button.textContent;
            button.disabled = true;
            button.textContent = '发送中...';
            button.classList.add('loading');
            
            const result = await controlDevice(deviceId, 'shutdown', 'now');
            
            if (result.success) {
                button.classList.remove('loading');
                button.classList.add('success');
                button.textContent = '已发送';
                showToast(`设备 ${deviceId.substring(0, 8)} 关机指令已发送，等待设备响应...`, 'success');
                
                setTimeout(() => {
                    button.classList.remove('success');
                    button.textContent = originalText;
                    button.disabled = false;
                }, 2000);
            } else {
                button.classList.remove('loading');
                button.textContent = originalText;
                button.disabled = false;
                showToast(`发送失败: ${result.error}`, 'error');
            }
        }
        
        function bindControlEvents() {
            document.addEventListener('click', (e) => {
                if (e.target.classList.contains('control-btn')) {
                    handleShutdownClick(e);
                }
            });
        }
        
        async function fetchDevices() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) {
                    throw new Error(`HTTP 错误: ${response.status}`);
                }
                const devices = await response.json();
                updateDashboard(devices);
            } catch (error) {
                console.error('获取设备数据失败:', error);
            }
        }
        
        function showLoginModal() {
            document.getElementById('login-modal').classList.add('active');
        }
        
        function showRegisterModal() {
            document.getElementById('register-modal').classList.add('active');
        }
        
        function showFeedbackModal() {
            switchFeedbackTab('new');

        async function login() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            
            if (!username || !password) {
                showToast('请输入用户名和密码', 'error');
                return;
            }
            
            try {
                const response = await fetch('/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '登录失败');
                }
                
                const result = await response.json();
                currentUser = {
                    id: result.user_id,
                    username: result.username,
                    role: result.role
                };
                
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                updateUserUI();
                closeModal('login-modal');
                showToast('登录成功！', 'success');
                
                if (currentUser.role === 'admin' || currentUser.role === 'staff') {
                    loadComplaints();
                }
                
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

            const password = document.getElementById('register-password').value;

        async function refreshHistoryData() {
            if (!currentHistoryDeviceId) {
                return;
            }
            
            const refreshBtn = document.getElementById('refresh-history-btn');
            refreshBtn.disabled = true;
            refreshBtn.textContent = '加载中...';
            
            try {
                const timeRangeHours = parseInt(document.getElementById('time-range-select').value);
                const intervalSeconds = parseInt(document.getElementById('interval-select').value);
                
                const now = new Date();
                const endTime = new Date(now.getTime() + 12 * 60 * 60 * 1000);
                const startTime = new Date(endTime.getTime() - timeRangeHours * 60 * 60 * 1000);
                
                const formatTime = (date) => {
                    return date.toISOString().replace('Z', '').substring(0, 19);
                };
                
                const startStr = formatTime(startTime);
                const endStr = formatTime(endTime);
                
                const url = `/devices/${currentHistoryDeviceId}/history?start_time=${startStr}&end_time=${endStr}&interval_seconds=${intervalSeconds}`;
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`查询失败: ${response.status}`);
                }
                
                const result = await response.json();
                
                const totalPoints = result.total_data_points || 0;
                const dataPoints = result.data_points || [];
                
                document.getElementById('stat-total-points').textContent = totalPoints;
                
                if (totalPoints === 0) {
                    document.getElementById('stat-avg-temp').textContent = '-';
                    document.getElementById('stat-max-temp').textContent = '-';
                    document.getElementById('stat-alert-card').style.display = 'none';
                    
                    if (historyChart) {
                        historyChart.setOption({
                            xAxis: { data: [] },
                            series: [
                                { data: [] },
                                { data: [] },
                                { data: [] },
                                { data: [] }
                            ]
                        });
                    }
                    
                    showToast('暂无历史数据', 'error');
                    return;
                }
                
                const timeLabels = [];
                const avgData = [];
                const maxData = [];
                const minData = [];
                const alertPoints = [];
                
                let totalTempSum = 0;
                let totalTempCount = 0;
                let overallMax = -Infinity;
                let alertPointCount = 0;
                
                dataPoints.forEach((point, index) => {
                    const timeLabel = point.window_start.replace('T', ' ').substring(5, 16);
                    timeLabels.push(timeLabel);
                    
                    const temp = point.temperature;
                    avgData.push(temp.avg);
                    maxData.push(temp.max);
                    minData.push(temp.min);
                    
                    if (temp.avg !== null) {
                        totalTempSum += temp.avg * temp.count;
                        totalTempCount += temp.count;
                    }
                    
                    if (temp.max !== null && temp.max > overallMax) {
                        overallMax = temp.max;
                    }
                    
                    if (point.has_alert) {
                        alertPointCount++;
                        alertPoints.push({
                            name: '告警',
                            value: [index, temp.max || 0],
                            itemStyle: {
                                color: '#ff5252'
                            }
                        });
                    }
                });
                
                const avgTemp = totalTempCount > 0 ? (totalTempSum / totalTempCount).toFixed(1) : '-';
                const maxTemp = overallMax > -Infinity ? overallMax.toFixed(1) : '-';
                
                document.getElementById('stat-avg-temp').textContent = avgTemp;
                document.getElementById('stat-max-temp').textContent = maxTemp;
                
                const alertCard = document.getElementById('stat-alert-card');
                if (alertPointCount > 0) {
                    alertCard.style.display = 'block';
                    document.getElementById('stat-alert-count').textContent = alertPointCount;
                } else {
                    alertCard.style.display = 'none';
                }
                
                if (historyChart) {
                    historyChart.setOption({
                        xAxis: { data: timeLabels },
                        series: [
                            { data: avgData },
                            { data: maxData },
                            { data: minData },
                            { data: alertPoints }
                        ]
                    });
                }
                
            } catch (error) {
                console.error('获取历史数据失败:', error);
                showToast(error.message || '获取历史数据失败', 'error');
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.textContent = '刷新数据';
            }
        }

        function initRealtimeChart(chartId, deviceId) {
            const chartDom = document.getElementById(chartId);
            if (!chartDom) return null;
            
            const loadingEl = chartDom.querySelector('.chart-loading');
            if (loadingEl) {
                loadingEl.style.display = 'none';
            }
            
            let chart = realtimeCharts.get(deviceId);
            if (chart) {
                chart.dispose();
            }
            
            chart = echarts.init(chartDom);
            
            const option = {
                backgroundColor: 'transparent',
                grid: {
                    left: '3%',
                    right: '3%',
                    bottom: '10%',
                    top: '15%',
                    containLabel: false
                },
                xAxis: {
                    type: 'category',
                    boundaryGap: false,
                    data: [],
                    axisLine: {
                        lineStyle: { color: 'rgba(255, 255, 255, 0.1)' }
                    },
                    axisLabel: {
                        color: '#78909c',
                        fontSize: 9,
                        interval: 'auto'
                    },
                    axisTick: { show: false }
                },
                yAxis: {
                    type: 'value',
                    axisLine: { show: false },
                    axisLabel: {
                        color: '#78909c',
                        fontSize: 10
                    },
                    splitLine: {
                        lineStyle: { color: 'rgba(255, 255, 255, 0.05)' }
                    }
                },
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(26, 26, 46, 0.95)',
                    borderColor: 'rgba(79, 195, 247, 0.5)',
                    textStyle: { color: '#e0e0e0' },
                    formatter: function(params) {
                        if (!params || params.length === 0) return '';
                        let result = params[0].axisValue + '<br/>';
                        params.forEach(param => {
                            if (param.seriesType === 'line') {
                                result += `${param.marker} 温度: ${param.value.toFixed(2)}°C<br/>`;
                            } else if (param.seriesType === 'scatter') {
                                result += `${param.marker} <span style="color:#ff5252;font-weight:bold;">告警!</span><br/>`;
                            }
                        });
                        return result;
                    }
                },
                series: [
                    {
                        name: '温度',
                        type: 'line',
                        smooth: true,
                        symbol: 'circle',
                        symbolSize: 4,
                        data: [],
                        lineStyle: {
                            color: '#4fc3f7',
                            width: 2
                        },
                        itemStyle: {
                            color: '#4fc3f7'
                        },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(79, 195, 247, 0.25)' },
                                { offset: 1, color: 'rgba(79, 195, 247, 0.02)' }
                            ])
                        }
                    },
                    {
                        name: '告警点',
                        type: 'scatter',
                        data: [],
                        symbolSize: 8,
                        itemStyle: {
                            color: '#ff5252',
                            shadowBlur: 6,
                            shadowColor: 'rgba(255, 82, 82, 0.5)'
                        }
                    }
                ]
            };
            
            chart.setOption(option);
            realtimeCharts.set(deviceId, chart);
            
            return chart;
        }
        
        async function fetchRealtimeData(deviceId) {
            try {
                const response = await fetch(`/devices/${deviceId}/history/latest?limit=${REALTIME_DATA_LIMIT}`);
                if (!response.ok) {
                    return null;
                }
                return await response.json();
            } catch (error) {
                console.error(`[RealtimeChart] Failed to fetch data for device ${deviceId}:`, error);
                return null;
            }
        }
        
        function updateRealtimeChart(deviceId, data) {
            const chart = realtimeCharts.get(deviceId);
            if (!chart || !data || !data.data_points || data.data_points.length === 0) {
                return;
            }
            
            const timeLabels = [];
            const tempData = [];
            const alertPoints = [];
            
            data.data_points.forEach((point, index) => {
                if (point.timestamp && point.temperature !== null) {
                    const timeStr = point.timestamp.replace('T', ' ').substring(11, 19);
                    timeLabels.push(timeStr);
                    tempData.push(point.temperature);
                    
                    if (point.is_alert) {
                        alertPoints.push({
                            value: [index, point.temperature],
                            itemStyle: { color: '#ff5252' }
                        });
                    }
                }
            });
            
            if (timeLabels.length === 0) return;
            
            chart.setOption({
                xAxis: { data: timeLabels },
                series: [
                    { data: tempData },
                    { data: alertPoints }
                ]
            });
        }
        
        function refreshAllRealtimeCharts() {
            const chartContainers = document.querySelectorAll('.realtime-chart-container[data-device-id]');
            
            chartContainers.forEach(container => {
                const deviceId = container.dataset.deviceId;
                const chartId = container.id;
                
                if (!realtimeCharts.has(deviceId)) {
                    initRealtimeChart(chartId, deviceId);
                }
                
                fetchRealtimeData(deviceId).then(data => {
                    if (data) {
                        updateRealtimeChart(deviceId, data);
                    }
                });
            });
        }
        
        function resizeRealtimeCharts() {
            realtimeCharts.forEach(chart => {
                if (chart) {
                    chart.resize();
                }
            });
        }
        
        async function handleSwitchChange(checkbox) {
            const deviceId = checkbox.dataset.deviceId;
            const command = checkbox.dataset.command;
            const isChecked = checkbox.checked;
            const value = isChecked ? 'on' : 'off';
            
            checkbox.disabled = true;
            
            const result = await controlDevice(deviceId, command, value);
            
            if (result.success) {
                const commandText = `${command}=${value}`;
                addCommandToHistory(deviceId, commandText, true);
                showToast(`指令已发送: ${commandText}`, 'success');
            } else {
                checkbox.checked = !isChecked;
                addCommandToHistory(deviceId, `${command}=${value}`, false, result.error);
                showToast(`发送失败: ${result.error}`, 'error');
            }
            
            checkbox.disabled = false;
        }
        
        async function sendCustomCommand(deviceId) {
            const inputId = `command-input-${deviceId.replace(/-/g, '')}`;
            const input = document.getElementById(inputId);
            const button = input?.nextElementSibling;
            
            if (!input || !input.value.trim()) {
                showToast('请输入指令内容', 'error');
                return;
            }
            
            const commandText = input.value.trim();
            
            let command = 'custom';
            let value = commandText;
            
            if (commandText.includes('=')) {
                const parts = commandText.split('=');
                command = parts[0].trim();
                value = parts.slice(1).join('=').trim();
            }
            
            if (input) input.disabled = true;
            if (button) button.disabled = true;
            
            const result = await controlDevice(deviceId, command, value);
            
            if (result.success) {
                addCommandToHistory(deviceId, commandText, true);
                showToast('指令已发送', 'success');
                if (input) input.value = '';
            } else {
                addCommandToHistory(deviceId, commandText, false, result.error);
                showToast(`发送失败: ${result.error}`, 'error');
            }
            
            if (input) input.disabled = false;
            if (button) button.disabled = false;
        }
        
        function addCommandToHistory(deviceId, commandText, success, errorMsg = null) {
            const historyId = `command-history-${deviceId.replace(/-/g, '')}`;
            const historyEl = document.getElementById(historyId);
            
            if (!historyEl) return;
            
            if (!commandHistories.has(deviceId)) {
                commandHistories.set(deviceId, []);
            }
            
            const history = commandHistories.get(deviceId);
            const timestamp = new Date().toLocaleTimeString('zh-CN');
            
            history.unshift({
                text: commandText,
                success: success,
                error: errorMsg,
                timestamp: timestamp
            });
            
            if (history.length > 5) {
                history.pop();
            }
            
            let html = '';
            history.forEach(item => {
                const statusClass = item.success ? 'success' : 'error';
                const statusText = item.success ? '已发送' : (item.error || '失败');
                html += `
                    <div class="command-history-item">
                        <span class="cmd-text">${escapeHtml(item.text)}</span>
                        <span class="cmd-status ${statusClass}">${item.timestamp} · ${statusText}</span>
                    </div>
                `;
            });
            
            historyEl.innerHTML = html;
        }
        
        function init() {
            bindControlEvents();
            fetchDevices();
            setInterval(fetchDevices, REFRESH_INTERVAL);
            
            setTimeout(() => {
                refreshAllRealtimeCharts();
                setInterval(refreshAllRealtimeCharts, REFRESH_INTERVAL);
            }, 500);
            
            window.addEventListener('resize', () => {
                setTimeout(resizeRealtimeCharts, 100);
            });
            
            document.querySelectorAll('.nav-tab[data-tab]').forEach(tab => {
                tab.addEventListener('click', () => switchTab(tab.dataset.tab));
            });
            
            document.querySelectorAll('.modal-overlay').forEach(overlay => {
                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) {
                        overlay.classList.remove('active');
                    }
                });
            });
            
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                try {
                    currentUser = JSON.parse(savedUser);
                    updateUserUI();
                } catch (e) {
                    localStorage.removeItem('currentUser');
                }
            }
        }
        
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
