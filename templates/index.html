<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT 设备监控大屏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .header {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header h1 {
            color: #4fc3f7;
            font-size: 28px;
            font-weight: 600;
        }
        
        .status-bar {
            display: flex;
            gap: 30px;
            align-items: center;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-dot.online {
            background: #4caf50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }
        
        .status-dot.offline {
            background: #f44336;
            box-shadow: 0 0 10px rgba(244, 67, 54, 0.3);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .last-update {
            color: #90a4ae;
            font-size: 12px;
        }
        
        .main-content {
            padding: 40px;
        }
        
        .devices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        
        .device-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .device-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
        }
        
        .device-card.online::before {
            background: linear-gradient(90deg, #4caf50, #8bc34a);
        }
        
        .device-card.offline::before {
            background: linear-gradient(90deg, #f44336, #ff5722);
        }
        
        .device-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(79, 195, 247, 0.3);
        }
        
        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
        }
        
        .device-info h3 {
            font-size: 18px;
            color: #fff;
            margin-bottom: 5px;
        }
        
        .device-info .device-id {
            font-size: 12px;
            color: #78909c;
            font-family: monospace;
        }
        
        .device-status {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .device-status.online {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }
        
        .device-status.offline {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }
        
        .sensor-data {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .sensor-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        
        .sensor-label {
            font-size: 12px;
            color: #90a4ae;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .sensor-value {
            font-size: 28px;
            font-weight: 700;
            color: #4fc3f7;
        }
        
        .sensor-value .unit {
            font-size: 14px;
            color: #78909c;
            margin-left: 4px;
        }
        
        .device-footer {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #546e7a;
        }
        
        .model-badge {
            background: rgba(79, 195, 247, 0.15);
            color: #4fc3f7;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 500;
        }
        
        .no-data {
            text-align: center;
            color: #546e7a;
            font-size: 14px;
            padding: 20px;
        }
        
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            color: #90a4ae;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(79, 195, 247, 0.1);
            border-top-color: #4fc3f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-message {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #f44336;
            padding: 15px 25px;
            border-radius: 8px;
            margin: 20px 40px;
            display: none;
        }
        
        .error-message.visible {
            display: block;
        }
        
        .control-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
        }
        
        .control-btn:disabled {
            background: #546e7a;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .control-btn:disabled:hover {
            transform: none;
            box-shadow: none;
        }
        
        .control-btn.success {
            background: linear-gradient(135deg, #4caf50, #45a049);
        }
        
        .control-btn.loading {
            background: linear-gradient(135deg, #78909c, #546e7a);
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            transition: transform 0.3s ease;
            max-width: 400px;
            text-align: center;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .toast.success {
            border-left: 4px solid #4caf50;
        }
        
        .toast.error {
            border-left: 4px solid #f44336;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>📡 IoT 设备监控大屏</h1>
        <div class="status-bar">
            <div class="status-item">
                <span class="status-dot online"></span>
                <span>在线: <strong id="online-count">0</strong></span>
            </div>
            <div class="status-item">
                <span class="status-dot offline"></span>
                <span>离线: <strong id="offline-count">0</strong></span>
            </div>
            <div class="last-update">
                最后更新: <span id="last-update">-</span>
            </div>
        </div>
    </header>
    
    <div id="error-message" class="error-message"></div>
    
    <main class="main-content">
        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <p>正在加载设备数据...</p>
        </div>
        
        <div id="devices-container" class="devices-grid" style="display: none;"></div>
    </main>
    
    <div id="toast" class="toast"></div>
    
    <script>
        const API_URL = '/devices';
        const REFRESH_INTERVAL = 5000;
        
        let onlineCount = 0;
        let offlineCount = 0;
        
        function formatDateTime(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }
        
        function formatSensorLabel(key) {
            const labels = {
                'temperature': '温度',
                'humidity': '湿度',
                'pressure': '气压',
                'battery': '电量',
                'signal': '信号',
                'light': '光照',
                'co2': 'CO2',
                'pm25': 'PM2.5',
                'voltage': '电压',
                'current': '电流'
            };
            return labels[key.toLowerCase()] || key;
        }
        
        function formatSensorValue(key, value) {
            const units = {
                'temperature': '°C',
                'humidity': '%',
                'pressure': 'hPa',
                'battery': '%',
                'signal': '%',
                'light': 'lux',
                'co2': 'ppm',
                'pm25': 'μg/m³',
                'voltage': 'V',
                'current': 'A'
            };
            
            let displayValue = value;
            if (typeof value === 'number') {
                displayValue = value.toFixed(1);
            }
            
            const unit = units[key.toLowerCase()] || '';
            return `<span>${displayValue}</span><span class="unit">${unit}</span>`;
        }
        
        function createDeviceCard(device) {
            const isOnline = device.status === 'online';
            onlineCount += isOnline ? 1 : 0;
            offlineCount += isOnline ? 0 : 1;
            
            const statusClass = isOnline ? 'online' : 'offline';
            const statusText = isOnline ? '在线' : '离线';
            const btnDisabled = isOnline ? '' : 'disabled';
            
            let sensorHtml = '';
            if (device.latest_payload && Object.keys(device.latest_payload).length > 0) {
                const sensors = Object.entries(device.latest_payload);
                sensorHtml = '<div class="sensor-data">';
                
                sensors.forEach(([key, value]) => {
                    sensorHtml += `
                        <div class="sensor-item">
                            <div class="sensor-label">${formatSensorLabel(key)}</div>
                            <div class="sensor-value">${formatSensorValue(key, value)}</div>
                        </div>
                    `;
                });
                
                sensorHtml += '</div>';
            } else {
                sensorHtml = '<div class="no-data">暂无传感器数据</div>';
            }
            
            return `
                <div class="device-card ${statusClass}" data-device-id="${device.device_id}">
                    <div class="device-header">
                        <div class="device-info">
                            <h3>设备 ${device.device_id.substring(0, 8)}</h3>
                            <div class="device-id">ID: ${device.device_id}</div>
                        </div>
                        <div class="device-status ${statusClass}">
                            <span class="status-dot ${statusClass}"></span>
                            ${statusText}
                        </div>
                    </div>
                    
                    ${sensorHtml}
                    
                    <div class="device-footer">
                        <span class="model-badge">${device.model}</span>
                        <button class="control-btn" data-device-id="${device.device_id}" ${btnDisabled}>
                            远程关机
                        </button>
                    </div>
                </div>
            `;
        }
        
        function updateDashboard(devices) {
            const loadingElement = document.getElementById('loading');
            const container = document.getElementById('devices-container');
            const errorElement = document.getElementById('error-message');
            
            onlineCount = 0;
            offlineCount = 0;
            
            if (devices.length === 0) {
                loadingElement.style.display = 'flex';
                loadingElement.innerHTML = `
                    <div class="loading-spinner" style="animation: none;"></div>
                    <p>暂无设备数据，请先注册设备</p>
                `;
                container.style.display = 'none';
                return;
            }
            
            loadingElement.style.display = 'none';
            container.style.display = 'grid';
            errorElement.classList.remove('visible');
            
            container.innerHTML = devices.map(device => createDeviceCard(device)).join('');
            
            document.getElementById('online-count').textContent = onlineCount;
            document.getElementById('offline-count').textContent = offlineCount;
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString('zh-CN');
        }
        
        function showError(message) {
            const errorElement = document.getElementById('error-message');
            errorElement.textContent = message;
            errorElement.classList.add('visible');
        }
        
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        async function controlDevice(deviceId, command, value) {
            try {
                const response = await fetch(`/devices/control/${deviceId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        command: command,
                        value: value
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || `HTTP 错误: ${response.status}`);
                }
                
                const result = await response.json();
                return { success: true, data: result };
            } catch (error) {
                return { success: false, error: error.message };
            }
        }
        
        async function handleShutdownClick(event) {
            const button = event.target.closest('.control-btn');
            if (!button || button.disabled) return;
            
            const deviceId = button.dataset.deviceId;
            
            const originalText = button.textContent;
            button.disabled = true;
            button.textContent = '发送中...';
            button.classList.add('loading');
            
            const result = await controlDevice(deviceId, 'shutdown', 'now');
            
            if (result.success) {
                button.classList.remove('loading');
                button.classList.add('success');
                button.textContent = '已发送';
                showToast(`设备 ${deviceId.substring(0, 8)} 关机指令已发送，等待设备响应...`, 'success');
                
                setTimeout(() => {
                    button.classList.remove('success');
                    button.textContent = originalText;
                    button.disabled = false;
                }, 2000);
            } else {
                button.classList.remove('loading');
                button.textContent = originalText;
                button.disabled = false;
                showToast(`发送失败: ${result.error}`, 'error');
            }
        }
        
        function bindControlEvents() {
            document.addEventListener('click', (e) => {
                if (e.target.classList.contains('control-btn')) {
                    handleShutdownClick(e);
                }
            });
        }
        
        async function fetchDevices() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) {
                    throw new Error(`HTTP 错误: ${response.status}`);
                }
                const devices = await response.json();
                updateDashboard(devices);
            } catch (error) {
                console.error('获取设备数据失败:', error);
                showError(`无法连接到服务器: ${error.message}`);
            }
        }
        
        function init() {
            bindControlEvents();
            fetchDevices();
            setInterval(fetchDevices, REFRESH_INTERVAL);
        }
        
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
